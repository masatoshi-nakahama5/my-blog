<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <defs>
    <style>
      .tiger-body { animation: tigerFloat 3s ease-in-out infinite; }
      .tiger-shadow { animation: shadowPulse 3s ease-in-out infinite; transform-origin: 100px 276px; }
      @keyframes tigerFloat {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-12px); }
      }
      @keyframes shadowPulse {
        0%, 100% { transform: scaleX(1); opacity: 0.12; }
        50% { transform: scaleX(0.65); opacity: 0.06; }
      }
    </style>
  </defs>

  <!-- Shadow -->
  <ellipse class="tiger-shadow" cx="100" cy="276" rx="48" ry="7" fill="#000"/>

  <g class="tiger-body">
    <!-- Tail -->
    <path d="M140,212 Q178,200 183,230 Q187,254 168,258" stroke="#F4821C" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M140,212 Q178,200 183,230 Q187,254 168,258" stroke="#1A0F00" stroke-width="3" fill="none" stroke-linecap="round" stroke-dasharray="8 14" stroke-dashoffset="4"/>
    <ellipse cx="165" cy="261" rx="10" ry="12" fill="#FFF5E0"/>

    <!-- Body -->
    <rect x="57" y="128" width="86" height="98" rx="24" fill="#F4821C"/>
    <ellipse cx="100" cy="174" rx="27" ry="37" fill="#FFF5E0"/>
    <path d="M64,143 Q70,160 65,176" stroke="#1A0F00" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M136,143 Q130,160 135,176" stroke="#1A0F00" stroke-width="3.5" fill="none" stroke-linecap="round"/>

    <!-- Left arm -->
    <path d="M57,138 C26,148 20,176 32,184 C41,191 60,188 67,177" fill="#F4821C"/>
    <path d="M27,162 Q34,167 32,177" stroke="#1A0F00" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Right arm -->
    <path d="M143,138 C174,148 180,176 168,184 C159,191 140,188 133,177" fill="#F4821C"/>
    <path d="M173,162 Q166,167 168,177" stroke="#1A0F00" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Crossed arms -->
    <path d="M32,181 Q100,202 168,181" stroke="#F4821C" stroke-width="22" stroke-linecap="round" fill="none"/>
    <path d="M36,184 Q100,203 164,184" stroke="#FFF5E0" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.35"/>
    <path d="M55,190 Q100,202 145,190" stroke="#1A0F00" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>

    <!-- Legs -->
    <rect x="68" y="220" width="26" height="40" rx="13" fill="#F4821C"/>
    <rect x="106" y="220" width="26" height="40" rx="13" fill="#F4821C"/>
    <ellipse cx="81" cy="257" rx="18" ry="10" fill="#F4821C"/>
    <ellipse cx="119" cy="257" rx="18" ry="10" fill="#F4821C"/>
    <ellipse cx="69" cy="261" rx="5" ry="4" fill="#F4821C"/>
    <ellipse cx="81" cy="264" rx="5" ry="4" fill="#F4821C"/>
    <ellipse cx="93" cy="261" rx="5" ry="4" fill="#F4821C"/>
    <ellipse cx="107" cy="261" rx="5" ry="4" fill="#F4821C"/>
    <ellipse cx="119" cy="264" rx="5" ry="4" fill="#F4821C"/>
    <ellipse cx="131" cy="261" rx="5" ry="4" fill="#F4821C"/>

    <!-- Neck -->
    <rect x="80" y="120" width="40" height="22" rx="10" fill="#F4821C"/>

    <!-- Ears -->
    <polygon points="63,52 45,18 79,30" fill="#F4821C"/>
    <polygon points="137,52 155,18 121,30" fill="#F4821C"/>
    <line x1="63" y1="48" x2="56" y2="28" stroke="#1A0F00" stroke-width="2" stroke-linecap="round"/>
    <line x1="137" y1="48" x2="144" y2="28" stroke="#1A0F00" stroke-width="2" stroke-linecap="round"/>
    <polygon points="65,48 54,26 75,34" fill="#FFAAAA"/>
    <polygon points="135,48 146,26 125,34" fill="#FFAAAA"/>

    <!-- Head -->
    <circle cx="100" cy="79" r="54" fill="#F4821C"/>

    <!-- Head stripes -->
    <path d="M78,28 Q83,54 75,70" stroke="#1A0F00" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M122,28 Q117,54 125,70" stroke="#1A0F00" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M100,25 L100,50" stroke="#1A0F00" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- White muzzle -->
    <ellipse cx="100" cy="92" rx="27" ry="21" fill="#FFF5E0"/>

    <!-- Eyes（大きくてまるい・優しい目） -->
    <ellipse cx="84" cy="74" rx="12" ry="12" fill="white"/>
    <ellipse cx="116" cy="74" rx="12" ry="12" fill="white"/>
    <circle cx="86" cy="75" r="7.5" fill="#1A0F00"/>
    <circle cx="118" cy="75" r="7.5" fill="#1A0F00"/>
    <!-- 目のハイライト（大きめ） -->
    <circle cx="90" cy="71" r="3" fill="white"/>
    <circle cx="122" cy="71" r="3" fill="white"/>
    <circle cx="84" cy="77" r="1.2" fill="white"/>
    <circle cx="116" cy="77" r="1.2" fill="white"/>

    <!-- 眉毛（優しい・ゆるいカーブ） -->
    <path d="M75,63 Q84,60 93,63" stroke="#1A0F00" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M107,63 Q116,60 125,63" stroke="#1A0F00" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- ほっぺのチーク -->
    <ellipse cx="70" cy="85" rx="10" ry="7" fill="#FFB3B3" opacity="0.5"/>
    <ellipse cx="130" cy="85" rx="10" ry="7" fill="#FFB3B3" opacity="0.5"/>

    <!-- 頬のストライプ -->
    <path d="M52,78 Q61,81 66,86" stroke="#1A0F00" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M50,87 Q60,89 65,93" stroke="#1A0F00" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M148,78 Q139,81 134,86" stroke="#1A0F00" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M150,87 Q140,89 135,93" stroke="#1A0F00" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- 鼻 -->
    <ellipse cx="100" cy="88" rx="5.5" ry="4" fill="#1A0F00"/>

    <!-- 口（にっこり笑顔） -->
    <path d="M89,96 Q100,106 111,96" stroke="#1A0F00" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  </g>
</svg>
